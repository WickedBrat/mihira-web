<body class="bg-surface font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen overflow-x-hidden">
<!-- Subtle Peace Background Blobs -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] peace-glow rounded-full"></div>
<div class="absolute bottom-[5%] right-[-5%] w-[40%] h-[40%] peace-glow rounded-full"></div>
</div>
<!-- Main Canvas -->
<main class="relative z-10 min-h-screen flex flex-col px-6 md:px-20 lg:px-40 py-12 md:py-20">
<!-- Header / Logo Area -->
<header class="mb-20">
<h1 class="font-headline text-xl font-semibold tracking-tighter text-primary">Arth</h1>
</header>
<!-- Onboarding Question -->
<section class="max-w-2xl">
<span class="font-label text-xs uppercase tracking-[0.2em] text-secondary mb-4 block">Onboarding (Neutral)</span>
<h2 class="font-headline text-4xl md:text-6xl font-extrabold tracking-tight text-on-surface leading-tight mb-8">
                What's weighing on your mind?
            </h2>
<p class="text-on-surface-variant text-lg md:text-xl font-light mb-12 max-w-lg">
                Choose a focus area for today. Your path to clarity is a quiet, intentional journey.
            </p>
</section>
<!-- Bento Grid Choice Cards -->
<section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-20">
<!-- Decisions Card -->
<button class="glass-panel ghost-border rounded-xl p-8 flex flex-col items-start text-left group transition-all duration-300 hover:bg-surface-bright active:scale-95">
<div class="mb-10 p-3 rounded-full bg-primary/10 text-primary group-hover:bg-primary group-hover:text-on-primary transition-colors duration-500">
<span class="material-symbols-outlined text-3xl" data-icon="balance">balance</span>
</div>
<h3 class="font-headline text-2xl font-medium mb-2">Decisions</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">Finding clarity amidst complex choices.</p>
</button>
<!-- Relationships Card -->
<button class="glass-panel ghost-border rounded-xl p-8 flex flex-col items-start text-left group transition-all duration-300 hover:bg-surface-bright active:scale-95">
<div class="mb-10 p-3 rounded-full bg-secondary/10 text-secondary group-hover:bg-secondary group-hover:text-on-secondary transition-colors duration-500">
<span class="material-symbols-outlined text-3xl" data-icon="favorite">favorite</span>
</div>
<h3 class="font-headline text-2xl font-medium mb-2">Relationships</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">Nurturing connections with yourself and others.</p>
</button>
<!-- Anxiety Card -->
<button class="glass-panel ghost-border rounded-xl p-8 flex flex-col items-start text-left group transition-all duration-300 hover:bg-surface-bright active:scale-95">
<div class="mb-10 p-3 rounded-full bg-primary-fixed-dim/10 text-primary-fixed-dim group-hover:bg-primary-fixed-dim group-hover:text-on-primary-fixed transition-colors duration-500">
<span class="material-symbols-outlined text-3xl" data-icon="air">air</span>
</div>
<h3 class="font-headline text-2xl font-medium mb-2">Anxiety</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">Finding your center in the storm of noise.</p>
</button>
<!-- Purpose Card -->
<button class="glass-panel ghost-border rounded-xl p-8 flex flex-col items-start text-left group transition-all duration-300 hover:bg-surface-bright active:scale-95">
<div class="mb-10 p-3 rounded-full bg-tertiary-fixed-dim/10 text-tertiary-fixed-dim group-hover:bg-tertiary-fixed-dim group-hover:text-on-tertiary-fixed transition-colors duration-500">
<span class="material-symbols-outlined text-3xl" data-icon="self_improvement">self_improvement</span>
</div>
<h3 class="font-headline text-2xl font-medium mb-2">Purpose</h3>
<p class="text-sm text-on-surface-variant leading-relaxed">Aligning your daily actions with deeper intent.</p>
</button>
</section>
<!-- CTA & Action Footer -->
<footer class="mt-auto flex flex-col md:flex-row items-center justify-between gap-8 pt-10 border-t border-outline-variant/10">
<div class="flex items-center gap-4 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="info">info</span>
<p class="text-xs tracking-wide">Select one to continue your personalized onboarding.</p>
</div>
<button class="relative group px-12 py-5 rounded-full font-headline font-semibold text-on-primary overflow-hidden transition-all duration-300 active:scale-95 shadow-[0_0_40px_rgba(212,190,228,0.15)] hover:shadow-[0_0_60px_rgba(212,190,228,0.25)]">
<div class="absolute inset-0 bg-gradient-to-br from-primary to-primary-container transition-transform duration-500 group-hover:scale-110"></div>
<span class="relative z-10 flex items-center gap-2">
                    Let's Start
                    <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</span>
</button>
</footer>
